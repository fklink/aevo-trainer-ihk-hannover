<!doctype html>
<html lang="de">
<head>
  <script>
    const params = new URLSearchParams(window.location.search);

    if (params.get("share") !== "2abf91") {
      window.location.replace("404.html");
    }
  </script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <title>AEVO Prüfungstrainer</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="wrap">
  <header>
    <div>
      <h1>AEVO Prüfungstrainer</h1>
      <div id="meta" class="muted"></div>
    </div>

    <div class="btn-groups">

      <!-- obere Zeile -->
      <div class="btn-row">
        <button id="practiceBtn" onclick="setMode('practice')">Üben</button>
        <button id="examBtn" class="secondary" onclick="setMode('exam')">Prüfung</button>
        <button id="editorBtn" class="secondary" onclick="openEditor()">Editor</button>
        <button class="secondary" onclick="window.location.href='qr.html?share=2abf91'">QR-Code</button>
      </div>

      <!-- untere Zeile -->
      <div class="btn-row" id="modeActions">
        <!-- wird dynamisch gefüllt -->
      </div>

    </div>
  </header>

  <div class="card" id="app">Lade Fragen...</div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
