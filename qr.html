<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>QR-Code teilen</title>

  <link rel="stylesheet" href="style.css">

  <style>
    .qr-wrap{
      max-width:600px;
      margin:40px auto;
      text-align:center;
    }

    #qrcode{
      margin:30px auto;
      width:220px;
      background:white;
      padding:20px;
      border-radius:12px;
    }

    .share-link{
      margin-top:20px;
      word-break:break-all;
      font-size:14px;
    }

    .actions{
      margin-top:30px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

<div class="wrap">
  <div class="card qr-wrap">

    <h1>QR-Code teilen</h1>

    <div id="qrcode"></div>

    <div class="share-link" id="shareLink"></div>

    <div class="actions">

      <button onclick="copyLink()">
        Link kopieren
      </button>

      <button class="secondary"
              onclick="window.location.href='index.html?share=2abf91'">
        Zurück
      </button>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
const shareUrl =
  window.location.origin +
  window.location.pathname.replace("qr.html", "index.html") +
  "?share=2abf91";

document.getElementById("shareLink").textContent = shareUrl;

new QRCode(document.getElementById("qrcode"), {
  text: shareUrl,
  width: 220,
  height: 220
});

function copyLink() {

  navigator.clipboard.writeText(shareUrl);

  alert("Link kopiert");
}
</script>

</body>
</html>
